<!DOCTYPE html>
<html>
<head>
  <title>Kaboss Admin PRO</title>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

  <style>
    body{font-family:Arial; padding:20px;}
    input{padding:10px; width:100%; margin:5px 0;}
    button{padding:10px; background:green; color:white; border:none;}
    .box{border:1px solid #ccc; padding:10px; margin-top:10px;}
  </style>
</head>

<body>

<h1>🟦 Kaboss Admin Dashboard</h1>

<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">
<input id="image" placeholder="Image URL">

<button onclick="addProduct()">Add Product</button>

<hr>

<div id="list"></div>

<script>
const firebaseConfig = {
  apiKey: "PASTE_HERE",
  authDomain: "PASTE_HERE",
  databaseURL: "PASTE_HERE",
  projectId: "PASTE_HERE",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function addProduct(){
  let name = document.getElementById("name").value;
  let price = document.getElementById("price").value;
  let image = document.getElementById("image").value;

  db.ref("products").push({
    name, price, image
  });

  alert("Product Added!");
}

// LIVE LOAD PRODUCTS
db.ref("products").on("value", snapshot => {
  let data = snapshot.val();
  let html = "";

  for(let id in data){
    html += `
      <div class="box">
        <h3>${data[id].name}</h3>
        <p>${data[id].price} RWF</p>
      </div>
    `;
  }

  document.getElementById("list").innerHTML = html;
});
</script>

</body>
</html>
